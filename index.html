<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>在幹嘛 1 號 - iPhone 13 專用</title>
    <style>
        :root { --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #fff; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; overflow: hidden; touch-action: none; }
        * { -webkit-tap-highlight-color: transparent; outline: none !important; box-sizing: border-box; }
        
        #etherealToast { position: fixed; bottom: 12dvh; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: #fff; padding: 10px 24px; border-radius: 20px; font-size: 13px; opacity: 0; transition: 0.4s; z-index: 9999; pointer-events: none; }
        #etherealToast.active { opacity: 1; }

        .main-container { width: 500%; height: 100%; display: flex; transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        .page { width: 20%; height: 100%; position: relative; display: flex; flex-direction: column; align-items: center; padding-top: calc(8dvh + var(--safe-top)); }
        h1 { font-size: 32px; letter-spacing: 14px; font-weight: 300; margin: 0; color: #1c1c1e; }

        /* 💡 月曆抽屜：完整範本版 */
        #timeMachine { position: fixed; top: 10dvh; left: 50%; transform: translateX(-50%); width: 90%; background: #fff; border-radius: 24px; z-index: 3000; display: none; padding: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.12); border: 1px solid #f2f2f7; }
        .cal-header { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 11px; color: #aeaeb2; margin-bottom: 15px; font-weight: 600; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; }
        .cal-day { font-size: 15px; padding: 10px 0; border-radius: 50%; position: relative; color: #1c1c1e; }
        .cal-dot { width: 4px; height: 4px; background: #ff3b30; border-radius: 50%; position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%); }

        /* 💡 垃圾桶按鈕樣式 */
        .del-btn { background: none; border: none; padding: 8px; font-size: 16px; cursor: pointer; color: #ff3b30; opacity: 0.6; }
        .memory-item { position: relative; margin-bottom: 25px; width: 100%; }
        .content-row { display: flex; justify-content: space-between; align-items: flex-start; }
        .content-main { font-size: 19px; font-weight: 700; color: #1c1c1e; flex: 1; }

        /* 💡 透視：修正距離 */
        .galaxy-stage { width: 100%; height: 32dvh; position: relative; margin-top: 4dvh; }
        .sphere { position: absolute; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; border: 1px solid rgba(0,0,0,0.02); }
        .insight-box { width: 85%; margin-top: 6dvh; }
        .insight-bar { height: 4px; background: #f2f2f7; border-radius: 2px; margin-top: 8px; overflow: hidden; }
        .insight-fill { height: 100%; transition: 1s ease-out; }

        .scroll-v { width: 85%; overflow-y: auto; height: 65dvh; padding-left: 20px; border-left: 1px solid #f2f2f7; margin-top: 2dvh; touch-action: pan-y; }
        .dots-nav { position: fixed; bottom: calc(4dvh + var(--safe-bottom)); left: 50%; transform: translateX(-50%); display: flex; gap: 12px; }
        .dot { width: 4px; height: 4px; background: #d2d2d7; border-radius: 50%; transition: 0.3s; }
        .dot.active { background: #000; transform: scale(2.2); }

        .input-bar { position: absolute; bottom: calc(14dvh + var(--safe-bottom)); display: flex; align-items: center; border-bottom: 2px solid #000; background: #fff; width: 220px; }
        .pill { padding: 12px 24px; border-radius: 30px; background: #000; color: #fff; border: none; margin: 6px; font-size: 14px; }
        #stage1 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 90%; margin-top: 4dvh; }
        .sq-tag { aspect-ratio: 1; border-radius: 18px; border: 1px solid #eee; background: #fafafa; display: flex; align-items: center; justify-content: center; font-size: 13px; }
        .sq-tag.active { background: #000; color: #fff; border: none; }
    </style>
</head>
<body>
<div id="etherealToast"></div>
<div class="dots-nav"><div id="d0" class="dot active"></div><div id="d1" class="dot"></div><div id="d2" class="dot"></div><div id="d3" class="dot"></div><div id="d4" class="dot"></div></div>

<div class="main-container" id="stage">
    <section class="page"><h1>現在在幹嘛</h1><div id="p0-tags" style="display:flex; flex-wrap:wrap; justify-content:center; margin-top:4dvh;"></div><div class="input-bar"><input id="uIn" style="border:none;flex:1;text-align:center;font-size:16px" placeholder="此刻心情..."><button onclick="save('input')" style="background:#000;color:#fff;border:none;border-radius:50%;width:30px;height:30px">↑</button></div></section>
    <section class="page"><h1>標籤</h1><div id="p1-tags"></div><div class="input-bar"><input id="tIn" style="border:none;flex:1;text-align:center;font-size:16px" placeholder="新增標籤..."><button onclick="addT()" style="background:#000;color:#fff;border:none;border-radius:50%;width:30px;height:30px">＋</button></div></section>
    <section class="page"><h1>透視</h1><div id="g-stage" class="galaxy-stage"></div><div class="insight-box" id="insight"></div></section>
    <section class="page"><h1>回憶<span onclick="toggleTM()" style="font-size:11px;color:#bbb;margin-left:8px;cursor:pointer">時光機▼</span></h1><div id="timeMachine">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;"><button onclick="moveM(-1)" style="border:none;background:none;font-size:20px">‹</button><b id="calTitle"></b><button onclick="moveM(1)" style="border:none;background:none;font-size:20px">›</button></div>
        <div class="cal-header"><div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div></div><div class="cal-grid" id="calG"></div>
    </div><div id="m-area" class="scroll-v"></div></section>
    <section class="page"><h1>設定</h1><div id="q-ed" class="scroll-v" style="border:none"></div></section>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, updateDoc, doc, deleteDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    const firebaseConfig = { apiKey: "AIzaSyAt3NMGtToRrMbau8kIYyOybgIvH65a8rA", authDomain: "now-doing.firebaseapp.com", projectId: "now-doing", storageBucket: "now-doing.firebasestorage.app", messagingSenderId: "234295652644", appId: "1:234295652644:web:c9b3c37de32d9448d443b1" };
    const db = getFirestore(initializeApp(firebaseConfig));

    let tags = JSON.parse(localStorage.getItem('myPills')) || [{n:'☕ 休息',s:true},{n:'💇 工作',s:true}];
    let quotes = JSON.parse(localStorage.getItem('myQuotes')) || ["接受不完美的自己","每個都可以是你","詩人 你也可以"];
    let logs = []; let curP = 0; let vD = new Date();

    const toast = (m) => { const e = document.getElementById('etherealToast'); e.innerText = m; e.classList.add('active'); setTimeout(()=>e.classList.remove('active'),1500); };
    
    window.save = async (t, v) => {
        const val = t==='input'? document.getElementById('uIn').value : v; if(!val) return;
        await addDoc(collection(db, "daily_logs"), { action: val, type: t, ts: serverTimestamp() });
        toast('已紀錄'); if(t==='input') document.getElementById('uIn').value=''; renderTags();
    };

    window.del = async (id) => { if(confirm('確定要刪除這則心情嗎？')) { await deleteDoc(doc(db,"daily_logs",id)); toast('已刪除'); loadMem(); } };

    window.loadMem = async () => {
        const snap = await getDocs(query(collection(db,"daily_logs"), orderBy("ts","desc")));
        logs = snap.docs.map(d=>({id:d.id, ...d.data()}));
        const area = document.getElementById('m-area'); area.innerHTML = ''; let lastD = "";
        logs.forEach(d => {
            if(d.type === 'input') {
                const date = d.ts?.toDate() || new Date(); const dS = `${date.getMonth()+1}月${date.getDate()}日`;
                if(dS !== lastD) { area.innerHTML += `<div id="d-${dS}" style="font-size:12px;color:#8e8e93;margin:30px 0 15px -10px;font-weight:600">${dS}</div>`; lastD = dS; }
                const item = document.createElement('div'); item.className = 'memory-item';
                item.innerHTML = `<div class="content-row"><div class="content-main">${d.action}</div><button class="del-btn" onclick="del('${d.id}')">🗑️</button></div><div style="font-size:11px;color:#d2d2d7;margin-top:4px">${date.getHours()}:${String(date.getMinutes()).padStart(2,'0')}</div>`;
                area.appendChild(item);
            }
        });
        renderCal();
    };

    window.toggleTM = () => { const m = document.getElementById('timeMachine'); m.style.display = m.style.display==='block'?'none':'block'; };
    window.moveM = (n) => { vD.setMonth(vD.getMonth()+n); renderCal(); };
    window.jump = (id) => { const e = document.getElementById('d-'+id); if(e) { document.getElementById('m-area').scrollTo({top: e.offsetTop-20, behavior:'smooth'}); toggleTM(); } };

    window.renderCal = () => {
        const g = document.getElementById('calG'); g.innerHTML = '';
        const y = vD.getFullYear(), m = vD.getMonth(); document.getElementById('calTitle').innerText = `${y}年 ${m+1}月`;
        const start = new Date(y, m, 1).getDay(); const days = new Date(y, m+1, 0).getDate();
        for(let i=0; i<start; i++) g.innerHTML += '<div></div>';
        for(let d=1; d<=days; d++) {
            const has = logs.some(l => { const ld = l.ts?.toDate(); return ld && ld.getMonth()===m && ld.getDate()===d; });
            const el = document.createElement('div'); el.className = 'cal-day'; el.innerHTML = `${d}${has?'<div class="cal-dot"></div>':''}`;
            el.onclick = () => jump(`${m+1}月${d}日`); g.appendChild(el);
        }
    };

    window.loadInsight = async () => {
        const snap = await getDocs(collection(db,"daily_logs")); const counts = {}; let w=0, l=0;
        snap.forEach(d => { const a = d.data().action; if(d.data().type==='tag') counts[a] = (counts[a]||0)+1; if(a.includes('工')) w++; if(a.includes('休')) l++; });
        const total = (snap.size)||1;
        const s2 = document.getElementById('g-stage'); s2.innerHTML = '';
        const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]);
        const coords = [{x:0,y:0},{x:1,y:-0.5},{x:-1,y:0.6},{x:0.5,y:1.1},{x:-0.5,y:-1.1}];
        sorted.forEach(([n,c],i) => { if(i>4) return; const r = c/(sorted[0][1]||1); const sz = 50+(r*70); const b = document.createElement('div'); b.className='sphere'; b.style.cssText=`width:${sz}px;height:${sz}px;left:calc(50% + ${coords[i].x*110}px - ${sz/2}px);top:calc(50% + ${coords[i].y*90}px - ${sz/2}px);background:#f2f2f7;font-size:${10+(r*4)}px;`; b.innerText=n; s2.appendChild(b); });
        document.getElementById('insight').innerHTML = `<div style="margin-bottom:20px"><small style="color:#8e8e93">工作產出</small><div style="font-size:22px;font-weight:700">${Math.round(w/total*100)}%</div><div class="insight-bar"><div class="insight-fill" style="width:${w/total*100}%;background:#000"></div></div></div><div><small style="color:#8e8e93">生活能量</small><div style="font-size:22px;font-weight:700">${Math.round(l/total*100)}%</div><div class="insight-bar"><div class="insight-fill" style="width:${l/total*100}%;background:#000"></div></div></div>`;
    };

    const renderTags = () => {
        const s0 = document.getElementById('p0-tags'), s1 = document.getElementById('p1-tags'); s0.innerHTML=''; s1.innerHTML=''; s1.className='cal-grid'; s1.style.width='90%';
        tags.forEach((t, i) => {
            if(t.s) { const b = document.createElement('button'); b.className='pill'; b.innerText=t.n; b.onclick=()=>save('tag',t.n); s0.appendChild(b); }
            const b2 = document.createElement('div'); b2.className=t.s?'sq-tag active':'sq-tag'; b2.innerText=t.n;
            b2.onclick=()=>{t.s=!t.s; localStorage.setItem('myPills', JSON.stringify(tags)); renderTags();};
            let delT; b2.ontouchstart=()=>{delT=setTimeout(()=>{if(confirm('刪除標籤？')){tags.splice(i,1);renderTags();}},800)}; b2.ontouchend=()=>clearTimeout(delT);
            s1.appendChild(b2);
        });
    };

    window.addT = () => { const v = document.getElementById('tIn').value; if(v){tags.unshift({n:v,s:true}); renderTags(); document.getElementById('tIn').value='';}};

    window.onload = () => {
        const ed = document.getElementById('q-ed'); quotes.forEach((q,i)=>{ const d=document.createElement('div'); d.style.padding='15px 0'; d.innerHTML=`<input id="q-${i}" value="${q}" style="border:none;width:80%;font-size:16px"><button onclick="sq(${i})" style="border:none;background:none;font-weight:700">確定</button>`; ed.appendChild(d); });
        renderTags(); move(0);
    };
    window.sq = (i) => { quotes[i]=document.getElementById('q-'+i).value; localStorage.setItem('myQuotes', JSON.stringify(quotes)); toast('已儲存'); };

    const move = (i) => {
        document.getElementById('stage').style.transform = `translateX(-${i*20}%)`;
        document.querySelectorAll('.dot').forEach((d,idx)=>d.className=idx===i?'dot active':'dot');
        if(i===2) loadInsight(); if(i===3) loadMem();
    };

    let sX; window.addEventListener('touchstart', e => sX = e.touches[0].clientX);
    window.addEventListener('touchend', e => {
        const dX = sX - e.changedTouches[0].clientX; if(Math.abs(dX)>60 && !e.target.closest('#timeMachine') && e.target.tagName!=='INPUT'){ curP = dX>0?Math.min(curP+1,4):Math.max(curP-1,0); move(curP); }
    });
</script>
</body>
</html>
