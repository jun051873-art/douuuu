<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>在幹嘛 1 號 - 左右翻頁月曆版</title>
    <style>
        :root { --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #fff; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; overflow: hidden; -webkit-font-smoothing: antialiased; touch-action: none; }
        
        * { -webkit-tap-highlight-color: transparent; outline: none !important; -webkit-user-select: none; user-select: none; }
        input { -webkit-user-select: auto; user-select: auto; }

        #toast { position: fixed; bottom: 15dvh; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: #fff; padding: 12px 30px; border-radius: 35px; font-size: 13px; opacity: 0; transition: 0.3s; z-index: 9999; pointer-events: none; }
        
        #splashLayer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 9998; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: 0.8s; }
        #splashLayer.active { opacity: 1; pointer-events: all; }
        #splashLayer h2 { font-size: 16px; font-weight: 200; letter-spacing: 5px; color: #1d1d1f; animation: textBreath 2.6s ease-in-out forwards; }
        @keyframes textBreath { 0% { opacity: 0; filter: blur(10px); } 30% { opacity: 1; filter: blur(0); } 75% { opacity: 1; } 100% { opacity: 0; } }

        /* 💡 橫向翻頁佈局修正 [cite: 2026-03-10] */
        .main-container { width: 500%; height: 100%; transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: row; opacity: 1; }
        .page { width: 20%; height: 100dvh; flex-shrink: 0; position: relative; display: flex; flex-direction: column; align-items: center; box-sizing: border-box; }
        
        h1 { font-size: 32px !important; letter-spacing: 14px; font-weight: 300; margin-top: calc(12dvh + var(--safe-top)) !important; margin-bottom: 0; color: #000; text-align: center; }

        .pill-tag { padding: 12px 28px; border-radius: 40px; background: #000; color: #fff; border: none; font-size: 14px; margin: 8px; animation: naturalPulse 3.5s infinite ease-in-out; }
        .square-tag { width: 75px; height: 75px; border-radius: 20px; border: 0.8px solid #eee; margin: 8px; background: #fbfbfb; display: flex; flex-direction: column; align-items: center; justify-content: center; animation: naturalPulse 4s infinite ease-in-out; }
        .square-tag.selected { background: #000; color: #fff; border: none; transform: scale(1.05); }

        /* 💡 點點移至底部 [cite: 2026-03-10] */
        .dots-container { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: row; gap: 14px; z-index: 1000; }
        .dot { width: 3px; height: 3px; background: #d2d2d7; border-radius: 50%; transition: 0.4s; }
        .dot.active { background: #000; transform: scale(2.2); }

        .galaxy-stage { width: 100%; height: 42dvh; position: relative; display: flex; align-items: center; justify-content: center; margin-top: 4dvh; overflow: visible; }
        .sphere { position: absolute; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-align: center; border: 1px solid rgba(0,0,0,0.03); }

        .memory-area { width: 82%; overflow-y: auto; height: 68dvh; border-left: 1px solid #f2f2f7; padding-left: 24px; position: relative; margin-top: 1vh; touch-action: pan-y !important; -webkit-overflow-scrolling: touch; scroll-behavior: smooth; }
        .date-anchor { position: relative; font-size: 13px; font-weight: 600; margin: 40px 0 24px -24px; padding-left: 28px; color: #8e8e93; }
        .date-anchor::before { content: ''; position: absolute; left: 0; top: 50%; width: 22px; height: 2px; background: #000; }
        .weather-active-label { background: #000; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 10px; margin-left: 6px; }
        .weather-btn { background: transparent; border: none; padding: 6px 12px; font-size: 12px; color: #c7c7cc; margin-right: 4px; }

        /* 💡 月曆時光機樣式加固 [cite: 2026-03-09, 2026-03-10] */
        #timeMachine { position: fixed; top: 18dvh; left: 50%; transform: translateX(-50%); width: 85%; background: rgba(255,255,255,0.98); border-radius: 25px; z-index: 3000; display: none; padding: 20px; backdrop-filter: blur(15px); box-shadow: 0 15px 40px rgba(0,0,0,0.1); touch-action: auto; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; text-align: center; margin-top: 15px; }
        .cal-day { font-size: 13px; padding: 10px 0; border-radius: 10px; position: relative; cursor: pointer; color: #1c1c1e; }
        .heat-dot { width: 4px; height: 4px; background: #ff3b30; border-radius: 50%; position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%); }

        .input-section { position: absolute; bottom: calc(14dvh + var(--safe-bottom)); display: flex; align-items: center; border-bottom: 2px solid #000; padding: 6px; background: #fff; z-index: 10; }
        @keyframes naturalPulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.03); opacity: 0.9; } }
    </style>
</head>
<body>
<div id="toast"></div>
<div id="splashLayer"></div>
<div class="dots-container"><div id="dot0" class="dot"></div><div id="dot1" class="dot"></div><div id="dot2" class="dot"></div><div id="dot3" class="dot"></div><div id="dot4" class="dot"></div></div>
<div class="main-container" id="mainContainer">
    <section class="page" id="p0"><h1>現在在幹嘛</h1><div id="stage0" style="display:flex; flex-wrap:wrap; justify-content:center; width:90%; margin-top:4vh;"></div><div class="input-section"><input type="text" id="userInput" style="border:none;width:180px;text-align:center;font-size:16px" placeholder="此刻心情..."><button onclick="window.saveAction('input')" style="background:#000;color:#fff;border:none;border-radius:50%;width:32px;height:32px">↑</button></div></section>
    <section class="page" id="p1"><h1>標籤</h1><p style="font-size: 11px; color: #ddd; margin: 15px 0;">點擊切換 · 長按刪除</p><div id="stage1" style="display:flex; flex-wrap:wrap; justify-content:center; width:90%;"></div><div class="input-section"><input type="text" id="newTagInput" style="border:none;width:180px;text-align:center;font-size:16px" placeholder="新增標籤..."><button onclick="window.addNewTag()" style="background:#000;color:#fff;border:none;border-radius:50%;width:32px;height:32px">＋</button></div></section>
    <section class="page" id="p2"><h1>透視</h1><div id="stage2" class="galaxy-stage"></div><div id="insightArea" style="width: 82%; font-size: 12px; color: #bbb; line-height: 2.6; margin-top: 5dvh; text-align: center;"></div></section>
    <section class="page" id="p3"><h1>回憶<span onclick="window.toggleTimeMachine()" style="font-size: 10px; color: #bbb; cursor:pointer; padding: 10px;">時光機▼</span></h1><div id="timeMachine">
        <div style="display:flex;justify-content:space-between;align-items:center;"><button onclick="window.changeMonth(-1)" style="border:none;background:none;font-size:20px;">‹</button><div id="calTitle" style="font-weight:600;"></div><button onclick="window.changeMonth(1)" style="border:none;background:none;font-size:20px;">›</button></div>
        <div class="cal-grid" id="calGrid"></div>
    </div><div id="memoryArea" class="memory-area"></div></section>
    <section class="page" id="p4"><h1>設定</h1><div id="quoteEditor" style="width: 82%; margin-top: 5vh; max-height: 55dvh; overflow-y: auto;"></div></section>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, updateDoc, doc, deleteDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    const firebaseConfig = { apiKey: "AIzaSyAt3NMGtToRrMbau8kIYyOybgIvH65a8rA", authDomain: "now-doing.firebaseapp.com", projectId: "now-doing", storageBucket: "now-doing.firebasestorage.app", messagingSenderId: "234295652644", appId: "1:234295652644:web:c9b3c37de32d9448d443b1" };
    const db = getFirestore(initializeApp(firebaseConfig));

    let tags = JSON.parse(localStorage.getItem('myPills')) || [{ name: '☕ 休息', selected: true, count: 0 }, { name: '💇 工作', selected: true, count: 0 }];
    let quotes = JSON.parse(localStorage.getItem('myQuotes')) || ["：（多久沒問問自己了呢）", "每個都可以是你", "接受不完美的自己", "你值得擁有", "詩人 你也可以"];
    let viewDate = new Date(); let logsCache = []; let cur = 0;

    function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.style.opacity = 1; setTimeout(() => t.style.opacity = 0, 1500); }

    const triggerSplash = (idx) => {
        const splash = document.getElementById('splashLayer'); splash.innerHTML = `<h2>${quotes[idx]}</h2>`; splash.classList.add('active');
        setTimeout(() => {
            document.getElementById('mainContainer').style.transform = `translateX(-${idx * 20}%)`;
            document.querySelectorAll('.dot').forEach((d,i) => d.className = i === idx ? 'dot active' : 'dot');
            if(idx === 2) loadInsight(); if(idx === 3) loadMemories();
        }, 800);
        setTimeout(() => splash.classList.remove('active'), 2000);
    };

    window.saveAction = async (t, v) => {
        const val = t === 'input' ? document.getElementById('userInput').value : v; if(!val) return;
        await addDoc(collection(db, "daily_logs"), { action: val, type: t, weather: "曬", timestamp: serverTimestamp() });
        showToast(t === 'input' ? '已珍藏' : '已紀錄');
        if(t === 'input') document.getElementById('userInput').value = ''; renderAll();
    };

    /* 💡 長按刪除核心 [cite: 2026-03-10] */
    window.delLog = async (id) => { if(confirm('確定刪除這則紀錄？')) { await deleteDoc(doc(db, "daily_logs", id)); showToast('已移除'); window.loadMemories(); } };

    window.loadMemories = async () => {
        const snap = await getDocs(query(collection(db, "daily_logs"), orderBy("timestamp", "desc")));
        logsCache = snap.docs.map(d => ({id: d.id, ...d.data()})).filter(d => d.action);
        const area = document.getElementById('memoryArea'); area.innerHTML = ''; let lastDate = "";
        logsCache.forEach(d => {
            if(d.type === 'input') {
                const date = d.timestamp ? d.timestamp.toDate() : new Date();
                const rawDate = `${date.getMonth()+1}月${date.getDate()}日`;
                if(rawDate !== lastDate) { area.innerHTML += `<div id="date-${rawDate}" class="date-anchor">${rawDate}</div>`; lastDate = rawDate; }
                const div = document.createElement('div'); div.className = 'memory-item';
                div.innerHTML = `<div style="font-size:11px; color:#c7c7cc; margin-bottom:6px;">${date.getHours()}:${String(date.getMinutes()).padStart(2,'0')} <span class="weather-active-label">${d.weather || ''}</span></div><div class="content-main" style="font-size:18px; font-weight:700; color:#000;">${d.action}</div><div style="display:flex; margin-bottom:12px;">${['晴','陰','雨','風','雪','曬'].map(w => `<button class="weather-btn" onclick="window.updW('${d.id}','${w}')">${w}</button>`).join('')}</div>`;
                
                // 💡 掛鉤長按事件 [cite: 2026-03-09, 2026-03-10]
                let delT; div.addEventListener('touchstart', (e) => { if(e.target.tagName !== 'BUTTON') delT = setTimeout(() => window.delLog(d.id), 800); }, {passive: true});
                div.addEventListener('touchend', () => clearTimeout(delT), {passive: true});
                area.appendChild(div);
            }
        });
        window.renderCalendar();
    };

    window.jumpTo = (id) => { const el = document.getElementById('date-'+id); if(el) { document.getElementById('memoryArea').scrollTop = el.offsetTop - 20; window.toggleTimeMachine(); } };
    window.updW = async (id, w) => { await updateDoc(doc(db, "daily_logs", id), { weather: w }); window.loadMemories(); showToast('已紀錄'); };
    window.toggleTimeMachine = () => { const tm = document.getElementById('timeMachine'); tm.style.display = tm.style.display==='block'?'none':'block'; };
    window.changeMonth = (d) => { viewDate.setMonth(viewDate.getMonth() + d); window.renderCalendar(); };

    /* 💡 月曆網格邏輯 [cite: 2026-03-10] */
    window.renderCalendar = () => {
        const grid = document.getElementById('calGrid'); if(!grid) return; grid.innerHTML = '';
        const year = viewDate.getFullYear(), month = viewDate.getMonth();
        document.getElementById('calTitle').innerText = `${year}年 ${month+1}月`;
        const firstDay = new Date(year, month, 1).getDay(); const daysInMonth = new Date(year, month+1, 0).getDate();
        for(let i=0; i<firstDay; i++) grid.innerHTML += '<div></div>';
        for(let d=1; d<=daysInMonth; d++) {
            const hasLog = logsCache.some(l => { const ld = l.timestamp?.toDate() || new Date(); return ld.getMonth() === month && ld.getDate() === d; });
            const dayEl = document.createElement('div'); dayEl.className = 'cal-day'; dayEl.innerHTML = `${d}${hasLog ? '<div class="heat-dot"></div>' : ''}`;
            dayEl.onclick = (e) => { e.stopPropagation(); window.jumpTo(`${month+1}月${d}日`); }; grid.appendChild(dayEl);
        }
    };

    window.loadInsight = async () => {
        const snap = await getDocs(collection(db, "daily_logs")); const counts = {}; snap.forEach(d => { if(d.data().type === 'tag') counts[d.data().action] = (counts[d.data().action] || 0) + 1; });
        const sorted = Object.entries(counts).sort((a,b) => b[1] - a[1]); const s2 = document.getElementById('stage2'); s2.innerHTML = '';
        const coords = [{x:0, y:0}, {x:0.1, y:-1.1}, {x:0.9, y:-0.5}, {x:1.1, y:0.4}, {x:0.2, y:1.1}, {x:-0.8, y:0.6}, {x:-1.0, y:-0.3}];
        sorted.forEach(([name, count], i) => {
            if (i >= 7) return; const coord = coords[i]; const ratio = count / (sorted[0][1] || 1); const size = 55 + (ratio * 105);
            const b = document.createElement('div'); b.className = 'sphere';
            b.style.cssText = `width:${size}px; height:${size}px; left:calc(50% + ${coord.x * 135}px - ${size/2}px); top:calc(50% + ${coord.y * 135}px - ${size/2}px); background:rgb(${[0, 80, 130, 180, 210, 230, 245][i]},${[0, 80, 130, 180, 210, 230, 245][i]},${[0, 80, 130, 180, 210, 230, 245][i]}); color:${i<3?'#fff':'#000'}; font-weight:600; font-size:${10+(ratio*5)}px; z-index:${100-i};`;
            b.innerHTML = `<span>${name}</span>`; s2.appendChild(b);
        });
        document.getElementById('insightArea').innerHTML = `重心：${sorted[0]?.[0] || '--'}<br>紀錄總量：${snap.size} 則`;
    };

    window.renderAll = () => {
        const s0 = document.getElementById('stage0'), s1 = document.getElementById('stage1'); s0.innerHTML = ''; s1.innerHTML = '';
        let p0Count = 0;
        tags.forEach((t, i) => {
            // 💡 P0 鎖定 5 個 [cite: 2026-03-10]
            if(t.selected && p0Count < 5) { const b = document.createElement('button'); b.className = 'pill-tag'; b.innerText = t.name; b.onclick = () => window.saveAction('tag', t.name); s0.appendChild(b); p0Count++; }
            const b2 = document.createElement('button'); b2.className = t.selected ? 'square-tag selected' : 'square-tag';
            b2.innerHTML = `<span>${t.name}</span>`;
            let timer; b2.addEventListener('touchstart', () => timer = setTimeout(() => { if(confirm('刪除標籤？')){ tags.splice(i,1); renderAll(); localStorage.setItem('myPills', JSON.stringify(tags)); } }, 800), {passive: true});
            b2.addEventListener('touchend', () => clearTimeout(timer), {passive: true});
            b2.onclick = () => { t.selected = !t.selected; renderAll(); localStorage.setItem('myPills', JSON.stringify(tags)); };
            s1.appendChild(b2);
        });
    };

    window.addNewTag = () => { 
        if(tags.length >= 12) { showToast('上限 12 個標籤'); return; } // 💡 P1 鎖定 12 個 [cite: 2026-03-10]
        const v = document.getElementById('newTagInput').value; if(v){ tags.unshift({name:v, selected:true, count:0}); renderAll(); document.getElementById('newTagInput').value=''; showToast('已紀錄'); } 
    };

    window.onload = () => {
        const ed = document.getElementById('quoteEditor'); ed.innerHTML = '';
        quotes.forEach((q, i) => { ed.innerHTML += `<div style="padding:12px; border-bottom:0.5px solid #eee; display:flex; align-items:center;"><input id="q-${i}" style="flex:1; border:none;" value="${q}"><button onclick="window.sq(${i})" style="background:#000;color:#fff;border-radius:10px;padding:8px 14px;font-size:12px;">確定</button></div>`; });
        renderAll(); triggerSplash(0);
    };
    window.sq = (i) => { quotes[i] = document.getElementById('q-'+i).value; localStorage.setItem('myQuotes', JSON.stringify(quotes)); showToast('已鎖定'); };

    /* 💡 左右翻頁物理判定 [cite: 2026-03-10] */
    window.addEventListener('touchstart', e => { window.startX = e.touches[0].clientX; window.startY = e.touches[0].clientY; }, {passive: true});
    window.addEventListener('touchend', e => {
        const dX = window.startX - e.changedTouches[0].clientX;
        const dY = window.startY - e.changedTouches[0].clientY;
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON' || e.target.closest('#timeMachine')) return;
        if (Math.abs(dX) > Math.abs(dY) && Math.abs(dX) > 50) { // 判定為左右滑動
            cur = dX > 0 ? Math.min(cur + 1, 4) : Math.max(cur - 1, 0); triggerSplash(cur); 
        }
    }, {passive: false});
</script>
</body>
</html>
