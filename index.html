<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>在幹嘛 1 號 - 最強定稿版</title>
    <style>
        :root { --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; }
        * { -webkit-tap-highlight-color: transparent; outline: none !important; box-sizing: border-box; }
        input { -webkit-user-select: auto !important; -webkit-appearance: none; border-radius: 0; }

        #etherealToast { position: fixed; bottom: 18dvh; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: #fff; padding: 10px 24px; border-radius: 20px; font-size: 11px; opacity: 0; transition: 0.3s; z-index: 9999; pointer-events: none; }
        #etherealToast.active { opacity: 1; }

        #splashLayer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 9998; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: 0.6s; }
        #splashLayer.active { opacity: 1; pointer-events: all; }
        #splashLayer h2 { font-size: 19px; font-weight: 200; letter-spacing: 6px; color: #1c1c1e; animation: textBreath 2.4s ease-in-out forwards; }
        @keyframes textBreath { 0% { opacity: 0; filter: blur(10px); } 30% { opacity: 1; filter: blur(0); } 75% { opacity: 1; } 100% { opacity: 0; } }

        .main-container { width: 500%; height: 100%; display: flex; transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        .page { width: 20%; height: 100%; flex-shrink: 0; position: relative; display: flex; flex-direction: column; align-items: center; padding-top: calc(8dvh + var(--safe-top)); overflow: hidden; }
        h1 { font-size: 26px; letter-spacing: 12px; font-weight: 300; margin: 0; color: #1c1c1e; text-align: center; }

        .dots-container { position: fixed; bottom: calc(2.5dvh + var(--safe-bottom)); left: 50%; transform: translateX(-50%); display: flex; gap: 14px; z-index: 2000; }
        .dot { width: 3px; height: 3px; background: #d2d2d7; border-radius: 50%; transition: 0.3s; }
        .dot.active { background: #000; transform: scale(2); }

        /* 透視：護城河避位 */
        .galaxy-stage { width: 100%; height: 26dvh; position: relative; margin-top: 6dvh; overflow: visible; }
        .sphere { position: absolute; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-align: center; border: 1px solid rgba(0,0,0,0.03); animation: bubbleFloat var(--b-dur) infinite ease-in-out; }
        @keyframes bubbleFloat { 0%, 100% { transform: translate(0, 0) scale(1); } 33% { transform: translate(var(--b-x), var(--b-y)) scale(1.04); } 66% { transform: translate(calc(var(--b-x) * -0.7), calc(var(--b-y) * 1.1)) scale(0.98); } }
        
        /* 聲量三大標語回歸 */
        .insight-dashboard { width: 85%; margin-top: 5vh; }
        .insight-row { border-left: 1.5px solid #f2f2f7; padding-left: 16px; margin-bottom: 22px; }
        .insight-label { font-size: 10px; color: #aeaeb2; letter-spacing: 0.5px; }
        .insight-value { font-size: 20px; font-weight: 700; color: #1c1c1e; display: flex; align-items: baseline; gap: 5px; }
        .insight-bar-bg { height: 3px; background: #f8f8f9; border-radius: 2px; margin-top: 8px; overflow: hidden; width: 100%; }
        .insight-bar-fill { height: 100%; transition: 1.5s cubic-bezier(0.16, 1, 0.3, 1); }

        .scrollable-area { width: 85%; overflow-y: auto; height: 68dvh; border-left: 1.2px solid #f2f2f7; padding-left: 20px; margin-top: 1vh; touch-action: pan-y !important; -webkit-overflow-scrolling: touch; scroll-behavior: smooth; }
        .date-row { display: flex; align-items: center; margin: 30px 0 15px -20px; }
        .date-anchor { font-size: 11px; font-weight: 600; padding: 4px 10px; background: #2c2c2e; color: #fff; border-radius: 4px; }
        .trash-icon-btn { width: 22px; height: 22px; margin-left: 10px; background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23ffd9d9"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>') no-repeat center; background-size: contain; border: none; cursor: pointer; }

        #timeMachine { position: fixed; top: 12dvh; left: 50%; transform: translateX(-50%); width: 85%; background: rgba(255,255,255,0.98); border-radius: 24px; z-index: 3000; display: none; padding: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); border: 1px solid #eee; max-height: 40dvh; overflow-y: auto; touch-action: auto; }
        .tm-item { padding: 15px; border-bottom: 0.5px solid #f2f2f7; font-size: 14px; color: #1c1c1e; font-weight: 500; }

        .input-section { position: absolute; bottom: calc(8dvh + var(--safe-bottom)); display: flex; align-items: center; border-bottom: 2.2px solid #1c1c1e; padding: 6px; background: #fff; z-index: 100; width: 210px; }
        .pill-tag { padding: 12px 24px; border-radius: 40px; background: #1c1c1e; color: #fff; border: none; font-size: 14px; margin: 6px; }
        #stage1 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 90%; margin-top: 4vh; }
        .square-tag { aspect-ratio: 1; border-radius: 18px; border: 0.8px solid #eee; background: #fbfbfb; display: flex; align-items: center; justify-content: center; font-size: 12px; }
        .square-tag.selected { background: #1c1c1e; color: #fff; border: none; }
    </style>
</head>
<body>
<div id="etherealToast"></div><div id="splashLayer"></div>
<div class="dots-container"><div id="dot0" class="dot active"></div><div id="dot1" class="dot"></div><div id="dot2" class="dot"></div><div id="dot3" class="dot"></div><div id="dot4" class="dot"></div></div>

<div class="main-container" id="mainContainer">
    <section class="page"><h1>現在在幹嘛</h1><div id="stage0" style="display:flex; flex-wrap:wrap; justify-content:center; width:90%; margin-top:4vh;"></div><div class="input-section"><input type="text" id="userInput" style="border:none;width:100%;text-align:center;font-size:16px" placeholder="此刻心情..."><button onclick="window.saveAction('input')" style="background:#1c1c1e;color:#fff;border:none;border-radius:50%;width:30px;height:30px">↑</button></div></section>
    <section class="page"><h1>標籤</h1><p style="font-size: 10px; color: #aeaeb2; margin-top: 10px;">上限 12 個 · 長按刪除</p><div id="stage1"></div><div class="input-section" style="width:200px"><input type="text" id="newTagInput" style="border:none;width:100%;text-align:center;font-size:16px" placeholder="新增標籤..."><button onclick="window.handleAddNewTag()" style="background:#000;color:#fff;border:none;border-radius:50%;width:30px;height:30px">＋</button></div></section>
    <section class="page"><h1>透視</h1><div id="stage2" class="galaxy-stage"></div><div id="insightDashboard" class="insight-dashboard"></div></section>
    <section class="page"><h1 style="display:flex; align-items: baseline; justify-content: center;">回憶<span onclick="window.tm()" style="font-size: 11px; color: #aeaeb2; cursor:pointer; font-weight: 300; letter-spacing: -0.5px; padding: 10px;">時光機▼</span></h1><div id="timeMachine"></div><div id="memoryArea" class="scrollable-area"></div></section>
    <section class="page"><h1>設定</h1><div id="quoteEditor" class="scrollable-area" style="margin-top: 5vh; height: 50dvh;"></div></section>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, updateDoc, doc, deleteDoc, query, orderBy, serverTimestamp, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    const firebaseConfig = { apiKey: "AIzaSyAt3NMGtToRrMbau8kIYyOybgIvH65a8rA", authDomain: "now-doing.firebaseapp.com", projectId: "now-doing", storageBucket: "now-doing.firebasestorage.app", messagingSenderId: "234295652644", appId: "1:234295652644:web:c9b3c37de32d9448d443b1" };
    const db = getFirestore(initializeApp(firebaseConfig));

    let tags = [{ name: '☕ 休息', selected: true, count: 0 }, { name: '💇 工作', selected: true, count: 0 }];
    let quotes = JSON.parse(localStorage.getItem('myQuotes')) || ["接受不完美的自己","每個都可以是你","詩人 你也可以"];
    let viewDate = new Date(); let logsCache = []; let cur = 0;

    const showToast = (m) => { const t = document.getElementById('etherealToast'); t.innerText = m; t.classList.add('active'); setTimeout(() => t.classList.remove('active'), 2000); };
    const syncTags = async () => { try { await setDoc(doc(db, "app_data", "user_settings"), { myPills: JSON.stringify(tags) }); } catch(e) {} };
    const loadTags = async () => { const snap = await getDoc(doc(db, "app_data", "user_settings")); if(snap.exists() && snap.data().myPills) { tags = JSON.parse(snap.data().myPills); renderAll(); } };

    window.delLog = async (id) => { if(confirm('確定要刪除這則心情嗎？')) { await deleteDoc(doc(db, "daily_logs", id)); showToast('已移除'); window.loadMemories(); } };

    const triggerSplash = (idx) => {
        const s = document.getElementById('splashLayer'); s.innerHTML = `<h2>${quotes[idx]}</h2>`; s.classList.add('active');
        setTimeout(() => {
            document.getElementById('mainContainer').style.transform = `translateX(-${idx * 20}%)`;
            document.querySelectorAll('.dot').forEach((d,i) => d.className = i === idx ? 'dot active' : 'dot');
            if(idx === 2) loadInsight(); if(idx === 3) loadMemories();
        }, 850);
        setTimeout(() => s.classList.remove('active'), 2200);
    };

    window.saveAction = async (t, v) => {
        const val = t === 'input' ? document.getElementById('userInput').value : v; if(!val) return;
        await addDoc(collection(db, "daily_logs"), { action: val, type: t, weather: '', timestamp: serverTimestamp() });
        showToast(t === 'input' ? '已珍藏' : '已紀錄'); if(t === 'input') document.getElementById('userInput').value = ''; renderAll();
    };

    /* 💡 修復天氣與自訂輸入 [cite: 2026-03-13] */
    window.updW = async (id, w, isCust) => {
        const finalVal = w || (isCust ? document.getElementById('cust-' + id).value : null);
        if(!finalVal) return;
        try {
            await updateDoc(doc(db, "daily_logs", id), { weather: finalVal, isCustom: !!isCust });
            showToast(isCust ? '已珍藏' : '已紀錄'); window.loadMemories(); 
        } catch(e) { console.error("同步失敗", e); }
    };

    window.loadMemories = async () => {
        const snap = await getDocs(query(collection(db, "daily_logs"), orderBy("timestamp", "desc")));
        logsCache = snap.docs.map(d => ({id: d.id, ...d.data()})).filter(d => d.action);
        const area = document.getElementById('memoryArea'); area.innerHTML = ''; let lastDate = "";
        const tm = document.getElementById('timeMachine'); tm.innerHTML = '';
        logsCache.forEach(d => {
            if(d.type === 'input') {
                const date = d.timestamp ? d.timestamp.toDate() : new Date();
                const rawDate = `${date.getMonth()+1}月${date.getDate()}日`;
                if(rawDate !== lastDate) { 
                    area.innerHTML += `<div class="date-row" id="date-${rawDate}"><div class="date-anchor">${rawDate}</div><button class="trash-icon-btn" onclick="window.delLog('${d.id}')"></button></div>`; 
                    tm.innerHTML += `<div class="tm-item" onclick="window.jumpTo('${rawDate}')">${date.getFullYear()}年 ${rawDate}</div>`;
                    lastDate = rawDate; 
                }
                const div = document.createElement('div'); div.className = 'memory-item';
                div.innerHTML = `<div style="font-size:10px; color:#aeaeb2; margin-bottom:6px;">${d.weather || ''}</div><div style="font-size:17px; font-weight:700; color:#1c1c1e; margin-bottom:12px;">${d.action}</div><div style="display:flex;align-items:center;gap:10px;"><span style="font-size:10px;color:#aeaeb2;">${date.getHours()}:${String(date.getMinutes()).padStart(2,'0')}</span><div style="display:flex;gap:5px;">${['☀️','⛅','☁️','🌨️','☔','曬'].map(w => `<span onclick="window.updW('${d.id}','${w}', false)" style="cursor:pointer;opacity:${d.weather===w?'1':'0.3'};">${w}</span>`).join('')}</div></div><div style="display:flex;align-items:center;margin-top:10px;"><input type="text" id="cust-${d.id}" style="border:none; border-bottom:0.5px solid #f2f2f7; font-size:14px; width:110px;" placeholder="制定心情..."><button onclick="window.updW('${d.id}', null, true)" style="background:#000;color:#fff;border:none;border-radius:6px;padding:3px 8px;font-size:10px;margin-left:8px;">確定</button></div>`;
                area.appendChild(div);
            }
        });
    };

    window.jumpTo = (id) => { const el = document.getElementById('date-'+id); if(el) { document.getElementById('memoryArea').scrollTop = el.offsetTop - 20; window.tm(); } };
    window.tm = () => { const t = document.getElementById('timeMachine'); t.style.display = t.style.display==='block'?'none':'block'; };

    /* 💡 恢復最原始聲量版三大標語邏輯 */
    window.loadInsight = async () => {
        const snap = await getDocs(collection(db, "daily_logs"));
        let w=0, l=0, m=0; const counts = {};
        snap.forEach(d => { const a = d.data().action; if(d.data().type==='tag') counts[a]=(counts[a]||0)+1; if(a.includes('工')) w++; else if(a.includes('休')) l++; else m++; });
        const total = (w+l+m)||1;
        document.getElementById('insightDashboard').innerHTML = `
            <div class="insight-row"><div class="insight-value">工作產出 <span style="margin-left:auto">${Math.round(w/total*100)}%</span></div><div class="insight-bar-bg"><div class="insight-bar-fill" style="width:${(w/total*100)}%; background:#0071e3;"></div></div></div>
            <div class="insight-row"><div class="insight-value">生活能量 <span style="margin-left:auto">${Math.round(l/total*100)}%</span></div><div class="insight-bar-bg"><div class="insight-bar-fill" style="width:${(l/total*100)}%; background:#34c759;"></div></div></div>
            <div class="insight-row"><div class="insight-value">情緒脈絡 <span style="margin-left:auto">${Math.round(m/total*100)}%</span></div><div class="insight-bar-bg"><div class="insight-bar-fill" style="width:${(m/total*100)}%; background:#ff3b30;"></div></div></div>`;
        const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]); const s2 = document.getElementById('stage2'); s2.innerHTML = '';
        const coords = [{x:0, y:0}, {x:1.1, y:-0.4}, {x:-1.1, y:0.5}, {x:0.7, y:1.1}, {x:-0.8, y:-1.1}];
        sorted.forEach(([name, count], i) => { if (i >= 5) return; const coord = coords[i]; const ratio = count / (sorted[0][1]||1); const sz = 40 + (ratio * 60); const b = document.createElement('div'); b.className='sphere'; b.style.cssText=`width:${sz}px; height:${sz}px; left:calc(50% + ${coord.x * 110}px - ${sz/2}px); top:calc(50% + ${coord.y * 80}px - ${sz/2}px); background:rgb(${[0, 80, 130, 180, 210][i]},${[0, 80, 130, 180, 210][i]},${[0, 80, 130, 180, 210][i]}); color:${i<3?'#fff':'#000'}; font-size:${8+(ratio*3)}px; z-index:${100-i}; --b-dur:${(3.5+Math.random()*3)+'s'}; --b-x:${(Math.random()*10-5)+'px'}; --b-y:${(Math.random()*10-5)+'px'};`; b.innerHTML=`<span>${name}</span>`; s2.appendChild(b); });
    };

    window.renderAll = () => {
        const s0 = document.getElementById('stage0'), s1 = document.getElementById('stage1'); s0.innerHTML = ''; s1.innerHTML = '';
        let p0Count = 0;
        tags.forEach((t, i) => {
            if(t.selected && p0Count < 5) { const b = document.createElement('button'); b.className='pill-tag'; b.innerText=t.name; b.onclick=()=>window.saveAction('tag', t.name); s0.appendChild(b); p0Count++; }
            const b2 = document.createElement('button'); b2.className = t.selected ? 'square-tag selected' : 'square-tag'; b2.innerHTML = `<span>${t.name}</span>`;
            let delT; b2.addEventListener('touchstart', () => delT = setTimeout(async () => { if(confirm('刪除標籤？')){ tags.splice(i,1); renderAll(); await syncTags(); } }, 850), {passive: true});
            b2.addEventListener('touchend', () => clearTimeout(delT), {passive: true});
            b2.onclick = async (e) => { e.stopImmediatePropagation(); t.selected = !t.selected; renderAll(); await syncTags(); }; s1.appendChild(b2);
        });
    };

    window.handleAddNewTag = async () => { if(tags.length >= 12) { showToast('上限 12 個標籤'); return; } const v = document.getElementById('newTagInput').value; if(v){ tags.unshift({name:v, selected:true}); renderAll(); await syncTags(); document.getElementById('newTagInput').value=''; showToast('已記憶'); } };
    window.onload = async () => { await loadTags(); const ed = document.getElementById('quoteEditor'); quotes.forEach((q, i) => { const d=document.createElement('div'); d.style.padding='15px'; d.innerHTML=`<input id="q-${i}" value="${q}" style="border:none;width:80%;font-size:15px"><button onclick="window.sq(${i})" style="background:#1c1c1e;color:#fff;border-radius:10px;padding:8px 14px;font-size:12px;">確定</button>`; ed.appendChild(d); }); renderAll(); triggerSplash(0); };
    window.sq = (i) => { quotes[i] = document.getElementById('q-'+i).value; localStorage.setItem('myQuotes', JSON.stringify(quotes)); showToast('已鎖定'); };

    window.addEventListener('touchstart', e => { window.startX = e.touches[0].clientX; window.startY = e.touches[0].clientY; }, {passive: true});
    window.addEventListener('touchend', e => {
        const dX = window.startX - e.changedTouches[0].clientX;
        const dY = window.startY - e.changedTouches[0].clientY;
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON' || e.target.closest('#timeMachine')) return;
        if (Math.abs(dX) > Math.abs(dY) && Math.abs(dX) > 30) { cur = dX > 0 ? Math.min(cur + 1, 4) : Math.max(cur - 1, 0); triggerSplash(cur); }
    }, {passive: false});
</script>
</body>
</html>
