<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>在幹嘛 1 號 - 備忘錄純淨版</title>
    <style>
        :root { --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; }
        * { -webkit-tap-highlight-color: transparent; outline: none !important; -webkit-user-select: none; box-sizing: border-box; }
        input { -webkit-user-select: auto !important; outline: none !important; border: none !important; }

        #etherealToast { position: fixed; top: 46dvh; left: 50%; transform: translateX(-50%); color: #3a3a3c; font-size: 17px; font-weight: 200; letter-spacing: 5px; opacity: 0; transition: 1s; z-index: 9999; pointer-events: none; }
        #etherealToast.active { opacity: 0.7; transform: translateX(-50%) translateY(-25px); }

        #splashLayer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 9998; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: 0.6s; }
        #splashLayer.active { opacity: 1; pointer-events: all; }
        #splashLayer h2 { font-size: 19px; font-weight: 200; letter-spacing: 6px; color: #1c1c1e; animation: textBreath 2.4s ease-in-out forwards; }
        @keyframes textBreath { 0% { opacity: 0; filter: blur(10px); } 30% { opacity: 1; filter: blur(0); } 75% { opacity: 1; } 100% { opacity: 0; } }

        .main-container { width: 100%; height: 500%; display: flex; flex-direction: column; transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        .page { width: 100%; height: 20%; position: relative; display: flex; flex-direction: column; align-items: center; padding-top: calc(11dvh + var(--safe-top)); overflow: hidden; }
        h1 { font-size: 32px; letter-spacing: 14px; font-weight: 300; margin: 0; color: #1c1c1e; text-align: center; }

        .dots-container { position: fixed; left: 22px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 15px; z-index: 1000; }
        .dot { width: 3px; height: 3px; background: #d2d2d7; border-radius: 50%; transition: 0.4s; }
        .dot.active { background: #1c1c1e; transform: scale(2.5); }

        .memory-area { width: 88%; overflow-y: auto; height: 75dvh; border-left: 1.2px solid #f2f2f7; padding-left: 20px; margin-top: 2vh; -webkit-overflow-scrolling: touch; }
        .date-anchor { font-size: 11px; font-weight: 600; margin: 40px 0 20px -20px; padding: 4px 10px; background: #2c2c2e; color: #fff; border-radius: 4px; display: inline-block; letter-spacing: 1px; }
        
        .memory-item { margin-bottom: 35px; }
        /* 🎯 備忘錄樣式：時間與註記並排 */
        .time-row { display: flex; align-items: baseline; gap: 10px; font-size: 11px; color: #aeaeb2; margin-bottom: 8px; }
        .note-display { font-weight: 400; color: #c7c7cc; }
        
        .content-main { font-size: 19px; font-weight: 600; color: #1c1c1e; line-height: 1.4; margin-bottom: 12px; }
        
        /* 🎯 制定心情輸入框 */
        .memo-input { width: 90%; border: none; background: #f9f9f9; padding: 8px 12px; border-radius: 10px; font-size: 13px; color: #3a3a3c; transition: 0.3s; }
        .memo-input:focus { background: #f2f2f7; }

        .input-section { position: absolute; bottom: calc(12dvh + var(--safe-bottom)); display: flex; align-items: center; border-bottom: 2px solid #2c2c2e; padding: 6px; background: #fff; z-index: 100; }
        .pill-tag { padding: 13px 30px; border-radius: 40px; background: #1c1c1e; color: #fff; border: none; font-size: 15px; margin: 9px; cursor: pointer; }
    </style>
</head>
<body>
<div id="etherealToast"></div>
<div id="splashLayer"></div>
<div class="dots-container"><div id="dot0" class="dot"></div><div id="dot1" class="dot"></div><div id="dot2" class="dot"></div><div id="dot3" class="dot"></div><div id="dot4" class="dot"></div></div>

<div class="main-container" id="mainContainer">
    <section class="page"><h1>現在在幹嘛</h1><div id="stage0" style="display:flex; flex-wrap:wrap; justify-content:center; width:90%; margin-top:4vh;"></div><div class="input-section"><input type="text" id="userInput" style="border:none;width:180px;text-align:center;font-size:17px" placeholder="此刻心情..."><button id="sendBtn" style="background:#1c1c1e;color:#fff;border-radius:50%;width:34px;height:34px">↑</button></div></section>
    <section class="page"><h1>標籤</h1><p style="font-size: 12px; color: #ddd; margin: 15px 0;">點擊切換標籤</p><div id="stage1" style="display:flex; flex-wrap:wrap; justify-content:center; width:90%;"></div></section>
    <section class="page"><h1>透視</h1><div id="stage2" style="height:40dvh; display:flex; align-items:center; justify-content:center;">數據分析中...</div></section>
    <section class="page"><h1>回憶</h1><div id="memoryArea" class="memory-area"></div></section>
    <section class="page"><h1>設定</h1></section>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, updateDoc, doc, query, orderBy, serverTimestamp, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    
    const firebaseConfig = { apiKey: "AIzaSyAt3NMGtToRrMbau8kIYyOybgIvH65a8rA", authDomain: "now-doing.firebaseapp.com", projectId: "now-doing", storageBucket: "now-doing.firebasestorage.app", messagingSenderId: "234295652644", appId: "1:234295652644:web:c9b3c37de32d9448d443b1" };
    const db = getFirestore(initializeApp(firebaseConfig));

    let tags = []; let cur = 0;

    const triggerSplash = (idx) => {
        const s = document.getElementById('splashLayer'); s.innerHTML = `<h2>探索第 ${idx+1} 維度</h2>`; s.classList.add('active');
        setTimeout(() => {
            document.getElementById('mainContainer').style.transform = `translateY(-${idx * 20}%)`;
            document.querySelectorAll('.dot').forEach((d,i) => d.className = i === idx ? 'dot active' : 'dot');
            if(idx === 3) loadMemories();
        }, 1200);
        setTimeout(() => s.classList.remove('active'), 2600);
    };

    window.saveAction = async (t, v) => {
        const val = t === 'input' ? document.getElementById('userInput').value : v; 
        if(!val) return;
        try {
            await addDoc(collection(db, "daily_logs"), { action: val, type: t, memo: "", timestamp: serverTimestamp() });
            if(t === 'input') document.getElementById('userInput').value = '';
            triggerSplash(3);
        } catch(e) {}
    };

    // 💡 備忘錄核心邏輯：日期時間旁邊顯示 memo
    window.loadMemories = async () => {
        const snap = await getDocs(query(collection(db, "daily_logs"), orderBy("timestamp", "desc")));
        const area = document.getElementById('memoryArea'); area.innerHTML = ''; let lastDate = "";
        
        snap.forEach(d => {
            const data = d.data();
            if(data.type === 'input') {
                const date = data.timestamp ? data.timestamp.toDate() : new Date();
                const dStr = `${date.getMonth()+1}月${date.getDate()}日`;
                if(dStr !== lastDate) { area.innerHTML += `<div class="date-anchor">${dStr}</div>`; lastDate = dStr; }
                
                const item = document.createElement('div');
                item.className = 'memory-item';
                item.innerHTML = `
                    <div class="time-row">
                        <span>${date.getHours()}:${String(date.getMinutes()).padStart(2,'0')}</span>
                        <span class="note-display" id="display-${d.id}">${data.memo || ''}</span>
                    </div>
                    <div class="content-main">${data.action}</div>
                    <input type="text" class="memo-input" placeholder="制定心情備忘..." value="${data.memo || ''}" data-id="${d.id}">
                `;
                
                // 💡 即時保存備忘錄
                const input = item.querySelector('.memo-input');
                input.onblur = async () => {
                    const newMemo = input.value;
                    await updateDoc(doc(db, "daily_logs", d.id), { memo: newMemo });
                    document.getElementById(`display-${d.id}`).innerText = newMemo;
                };
                area.appendChild(item);
            }
        });
    };

    window.onload = async () => {
        document.getElementById('sendBtn').onclick = () => window.saveAction('input');
        const snap = await getDocs(collection(db, "daily_logs")); // 簡單標籤模擬
        const s0 = document.getElementById('stage0');
        ['☕ 休息', '💇 工作', '📖 閱讀'].forEach(t => {
            const b = document.createElement('button'); b.className = 'pill-tag'; b.innerText = t;
            b.onclick = () => window.saveAction('tag', t); s0.appendChild(b);
        });
        triggerSplash(0);
    };

    window.addEventListener('touchstart', e => window.startY = e.touches[0].clientY);
    window.addEventListener('touchend', e => {
        const dY = window.startY - e.changedTouches[0].clientY;
        if (Math.abs(dY) > 100) { cur = dY > 0 ? Math.min(cur + 1, 4) : Math.max(cur - 1, 0); triggerSplash(cur); }
    });
</script>
</body>
</html>
