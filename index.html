<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>在幹嘛 1 號 - 經典回歸版</title>
    <style>
        :root { --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; }
        * { -webkit-tap-highlight-color: transparent; outline: none !important; -webkit-user-select: none; box-sizing: border-box; }
        input { -webkit-user-select: auto; outline: none !important; border: none !important; }

        /* 唯美提示 */
        #etherealToast { position: fixed; top: 46dvh; left: 50%; transform: translateX(-50%); color: #3a3a3c; font-size: 17px; font-weight: 200; letter-spacing: 5px; opacity: 0; transition: 1s; z-index: 9999; pointer-events: none; }
        #etherealToast.active { opacity: 0.7; transform: translateX(-50%) translateY(-25px); }

        #splashLayer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 9998; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: 0.6s; }
        #splashLayer.active { opacity: 1; pointer-events: all; }
        #splashLayer h2 { font-size: 19px; font-weight: 200; letter-spacing: 6px; color: #1c1c1e; animation: textBreath 2.4s ease-in-out forwards; }
        @keyframes textBreath { 0% { opacity: 0; filter: blur(10px); } 30% { opacity: 1; filter: blur(0); } 75% { opacity: 1; } 100% { opacity: 0; } }

        .main-container { width: 100%; height: 500%; display: flex; flex-direction: column; transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        .page { width: 100%; height: 20%; position: relative; display: flex; flex-direction: column; align-items: center; padding-top: calc(10dvh + var(--safe-top)); overflow: hidden; }
        h1 { font-size: 32px; letter-spacing: 14px; font-weight: 300; margin: 0; color: #1c1c1e; text-align: center; }

        .dots-container { position: fixed; left: 22px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 15px; z-index: 1000; }
        .dot { width: 3px; height: 3px; background: #d2d2d7; border-radius: 50%; transition: 0.4s; }
        .dot.active { background: #1c1c1e; transform: scale(2.5); }

        /* 💡 透視：回歸大氣排版 [cite: 2026-03-06] */
        .galaxy-stage { width: 100%; height: 28dvh; position: relative; display: flex; align-items: center; justify-content: center; margin-top: 4dvh; overflow: visible; }
        .sphere { position: absolute; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-align: center; border: 1px solid rgba(0,0,0,0.03); animation: bubbleFloat var(--b-dur) infinite ease-in-out; }
        @keyframes bubbleFloat { 0%, 100% { transform: translate(0, 0) scale(1); } 33% { transform: translate(var(--b-x), var(--b-y)) scale(1.04); } 66% { transform: translate(calc(var(--b-x) * -0.7), calc(var(--b-y) * 1.1)) scale(0.98); } }

        /* 💡 之前的三大標語排版 */
        .classic-insight { width: 85%; margin-top: 5dvh; text-align: left; }
        .insight-row { margin-bottom: 25px; border-left: 2px solid #f2f2f7; padding-left: 20px; }
        .insight-label { font-size: 13px; color: #8e8e93; font-weight: 400; letter-spacing: 1px; margin-bottom: 5px; }
        .insight-value { font-size: 24px; font-weight: 700; color: #1c1c1e; display: flex; align-items: baseline; gap: 8px; }
        .insight-bar-bg { width: 100%; height: 4px; background: #f2f2f7; border-radius: 2px; margin-top: 10px; overflow: hidden; }
        .insight-bar-fill { height: 100%; transition: 1.5s cubic-bezier(0.16, 1, 0.3, 1); }

        /* 回憶視覺：黑底白字日期、灰底柔和標籤 [cite: 2026-02-19] */
        .memory-area { width: 82%; overflow-y: auto; height: 65dvh; border-left: 1.2px solid #f2f2f7; padding-left: 24px; margin-top: 2vh; -webkit-overflow-scrolling: touch; }
        .date-anchor { position: relative; font-size: 11px; font-weight: 600; margin: 40px 0 24px -24px; padding: 4px 10px; background: #2c2c2e; color: #fff; border-radius: 4px; display: inline-block; }
        .weather-active-label { background: #f2f2f7; color: #8e8e93; padding: 2px 8px; border-radius: 4px; font-size: 10px; margin-left: 6px; border: 0.5px solid #e5e5ea; }

        #timeMachine { position: absolute; top: 16dvh; width: 88%; background: rgba(255,255,255,0.98); border-radius: 30px; z-index: 2000; display: none; padding: 20px; backdrop-filter: blur(25px); box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
        .cal-day { font-size: 14px; padding: 10px 0; border-radius: 12px; position: relative; cursor: pointer; color: #1c1c1e; }
        .heat-dot { width: 3px; height: 3px; background: #8e8e93; border-radius: 50%; display: inline-block; margin: 0 1px; }

        .input-section { position: absolute; bottom: calc(12dvh + var(--safe-bottom)); display: flex; align-items: center; border-bottom: 2px solid #2c2c2e; padding: 6px; background: #fff; z-index: 100; }
        .square-tag { width: 75px; height: 75px; border-radius: 20px; border: 0.8px solid #eee; margin: 8px; background: #fbfbfb; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        .square-tag.selected { background: #1c1c1e; color: #fff; border: none; transform: scale(1.05); }
        .pill-tag { padding: 13px 30px; border-radius: 40px; background: #1c1c1e; color: #fff; border: none; font-size: 15px; margin: 9px; cursor: pointer; }
    </style>
</head>
<body>
<div id="etherealToast"></div>
<div id="splashLayer"></div>
<div class="dots-container"><div id="dot0" class="dot"></div><div id="dot1" class="dot"></div><div id="dot2" class="dot"></div><div id="dot3" class="dot"></div><div id="dot4" class="dot"></div></div>

<div class="main-container" id="mainContainer">
    <section class="page"><h1>現在在幹嘛</h1><div id="stage0" style="display:flex; flex-wrap:wrap; justify-content:center; width:90%; margin-top:4vh;"></div><div class="input-section"><input type="text" id="userInput" style="border:none;width:180px;text-align:center;font-size:17px" placeholder="此刻心情..."><button id="sendBtn" style="background:#1c1c1e;color:#fff;border:none;border-radius:50%;width:34px;height:34px">↑</button></div></section>
    <section class="page"><h1>標籤</h1><p style="font-size: 12px; color: #ddd; margin: 15px 0;">點擊切換 · 長按刪除</p><div id="stage1" style="display:flex; flex-wrap:wrap; justify-content:center; width:90%;"></div><div class="input-section"><input type="text" id="newTagInput" style="border:none;width:180px;text-align:center;font-size:16px" placeholder="新增標籤..."><button id="addTagBtn" style="background:#000;color:#fff;border:none;border-radius:50%;width:32px;height:32px">＋</button></div></section>
    
    <section class="page">
        <h1>透視</h1>
        <div id="stage2" class="galaxy-stage"></div>
        <div class="classic-insight">
            <div class="insight-row">
                <div class="insight-label">工作產出</div>
                <div class="insight-value"><span id="workVal">0</span><small style="font-size:12px; color:#aeaeb2;">%能量</small></div>
                <div class="insight-bar-bg"><div id="workClassic" class="insight-bar-fill" style="width:0%; background:#0071e3;"></div></div>
            </div>
            <div class="insight-row">
                <div class="insight-label">生活能量</div>
                <div class="insight-value"><span id="lifeVal">0</span><small style="font-size:12px; color:#aeaeb2;">%佔比</small></div>
                <div class="insight-bar-bg"><div id="lifeClassic" class="insight-bar-fill" style="width:0%; background:#34c759;"></div></div>
            </div>
            <div class="insight-row">
                <div class="insight-label">情緒脈絡</div>
                <div class="insight-value"><span id="moodVal">0</span><small style="font-size:12px; color:#aeaeb2;">%流動</small></div>
                <div class="insight-bar-bg"><div id="moodClassic" class="insight-bar-fill" style="width:0%; background:#ff3b30;"></div></div>
            </div>
        </div>
    </section>

    <section class="page"><h1 style="display:flex; align-items: baseline; justify-content: center;">回憶<span id="tmBtn" style="font-size: 11px; color: #aeaeb2; cursor:pointer; font-weight: 300; letter-spacing: -0.5px;">時光機▼</span></h1><div id="timeMachine"><div style="display:flex;justify-content:space-between;margin-bottom:15px;"><button id="prevM" style="border:none;background:none;font-size:18px;">‹</button><div id="calTitle" style="font-weight:600;"></div><button id="nextM" style="border:none;background:none;font-size:18px;">›</button></div><div class="cal-grid" id="calGrid"></div></div><div id="memoryArea" class="memory-area"></div></section>
    <section class="page"><h1>設定</h1><div id="quoteEditor" style="width: 82%; margin-top: 5vh; max-height: 45dvh; overflow-y: auto;"></div><p style="margin-top:30px; font-size:11px; color:#ddd; text-align:center;">長按紀錄條目可局部刪除</p></section>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, updateDoc, doc, deleteDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    
    // 💡 同步 now-doing 正確地基
    const firebaseConfig = { apiKey: "AIzaSyAt3NMGtToRrMbau8kIYyOybgIvH65a8rA", authDomain: "now-doing.firebaseapp.com", projectId: "now-doing", storageBucket: "now-doing.firebasestorage.app", messagingSenderId: "234295652644", appId: "1:234295652644:web:c9b3c37de32d9448d443b1" };
    const db = getFirestore(initializeApp(firebaseConfig));

    let tags = JSON.parse(localStorage.getItem('myPills')) || [{ name: '☕ 休息', selected: true, count: 0 }, { name: '💇 工作', selected: true, count: 0 }];
    let quotes = JSON.parse(localStorage.getItem('myQuotes')) || ["：（多久沒問問自己了呢）", "每個都可以是你", "接受不完美的自己", "你值得擁有", "詩人 你也可以"];
    let viewDate = new Date(); let logsCache = []; let cur = 0;

    function showToast(msg) { const t = document.getElementById('etherealToast'); t.innerText = msg; t.classList.add('active'); setTimeout(() => t.classList.remove('active'), 2000); }

    const triggerSplash = (idx) => {
        const s = document.getElementById('splashLayer'); s.innerHTML = `<h2>${quotes[idx]}</h2>`; s.classList.add('active');
        setTimeout(() => {
            document.getElementById('mainContainer').style.transform = `translateY(-${idx * 20}%)`;
            document.querySelectorAll('.dot').forEach((d,i) => d.className = i === idx ? 'dot active' : 'dot');
            if(idx === 2) loadInsight(); if(idx === 3) loadMemories();
        }, 1200);
        setTimeout(() => s.classList.remove('active'), 2600);
    };

    window.handleTagClick = async (tagName) => {
        try {
            await addDoc(collection(db, "daily_logs"), { action: tagName, type: 'tag', weather: '曬', isCustom: false, timestamp: serverTimestamp() });
            showToast('已紀錄'); loadInsight();
        } catch(e) { showToast('寫入失敗'); }
    };

    window.saveAction = async (t, v, isCust) => {
        const val = t === 'input' ? document.getElementById('userInput').value : v; if(!val) return;
        await addDoc(collection(db, "daily_logs"), { action: val, type: t, weather: t==='input'?'':(v||'曬'), isCustom: isCust||false, timestamp: serverTimestamp() });
        showToast(t === 'input' || isCust ? '已珍藏' : '已紀錄');
        if(t === 'input') document.getElementById('userInput').value = ''; renderAll();
    };

    window.loadMemories = async () => {
        try {
            const snap = await getDocs(query(collection(db, "daily_logs"), orderBy("timestamp", "desc")));
            logsCache = snap.docs.map(d => ({id: d.id, ...d.data()})).filter(d => d.action);
            const area = document.getElementById('memoryArea'); area.innerHTML = ''; let lastDate = "";
            logsCache.forEach(d => {
                if(d.type === 'input') {
                    const date = d.timestamp ? d.timestamp.toDate() : new Date();
                    const rawDate = `${date.getMonth()+1}月${date.getDate()}日`;
                    if(rawDate !== lastDate) { area.innerHTML += `<div id="date-${rawDate}" class="date-anchor">${date.getMonth()+1}月${date.getDate()}日 週${['日','一','二','三','四','五','六'][date.getDay()]}</div>`; lastDate = rawDate; }
                    const div = document.createElement('div'); div.className = 'memory-item';
                    div.innerHTML = `<div style="font-size:11px; color:#aeaeb2; margin-bottom:6px;">${date.getHours()}:${String(date.getMinutes()).padStart(2,'0')} <span class="${d.isCustom ? 'custom-active-label' : 'weather-active-label'}">${d.weather || ''}</span></div><div class="content-main">${d.action}</div><div class="w-btn-row"></div><div style="display:flex;align-items:center;margin-top:8px;"><input type="text" id="cust-${d.id}" style="border-bottom:0.5px solid #f2f2f7; font-size:14px; width:110px;" placeholder="制定心情..."><button class="c-btn" style="background:#000;color:#fff;border-radius:6px;padding:3px 8px;font-size:10px;margin-left:8px;">確定</button></div>`;
                    let delTimer; div.onmousedown = () => delTimer = setTimeout(() => { if(confirm('刪除紀錄？')){ deleteDoc(doc(db,"daily_logs",d.id)); window.loadMemories(); }}, 1000);
                    div.onmouseup = () => clearTimeout(delTimer); div.ontouchstart = div.onmousedown; div.ontouchend = div.onmouseup;
                    area.appendChild(div);
                    const row = div.querySelector('.w-btn-row');
                    ['晴','陰','雨','風','雪','曬'].forEach(w => { const b = document.createElement('button'); b.className='weather-btn'; b.innerText=w; b.onclick=(e)=>{e.stopPropagation(); window.updW(d.id,w,false)}; row.appendChild(b); });
                    div.querySelector('.c-btn').onclick=(e)=>{e.stopPropagation(); window.updW(d.id, document.getElementById('cust-'+d.id).value, true)};
                }
            });
            window.renderCalendar();
        } catch(e) {}
    };

    /* 💡 透視：氣泡避位與三大標語計算 [cite: 2026-03-06] */
    window.loadInsight = async () => {
        try {
            const snap = await getDocs(collection(db, "daily_logs"));
            const counts = {}; let w=0, l=0, m=0;
            snap.forEach(d => {
                const act = d.data().action;
                if(d.data().type === 'tag') counts[act] = (counts[act] || 0) + 1;
                if(act.includes('工作') || act.includes('產出')) w++; else if(act.includes('休息') || act.includes('生活')) l++; else m++;
            });
            const total = (w + l + m) || 1;
            const wp = Math.round(w/total*100), lp = Math.round(l/total*100), mp = Math.round(m/total*100);
            document.getElementById('workVal').innerText = wp; document.getElementById('workClassic').style.width = wp + '%';
            document.getElementById('lifeVal').innerText = lp; document.getElementById('lifeClassic').style.width = lp + '%';
            document.getElementById('moodVal').innerText = mp; document.getElementById('moodClassic').style.width = mp + '%';

            const sorted = Object.entries(counts).sort((a,b) => b[1] - a[1]); const s2 = document.getElementById('stage2'); s2.innerHTML = '';
            // 💡 避位坐標優化
            const coords = [{x:0, y:0}, {x:1.1, y:-0.4}, {x:-1.1, y:0.5}, {x:0.7, y:1.1}, {x:-0.8, y:-1.1}, {x:0.3, y:-1.2}, {x:-0.3, y:1.2}];
            sorted.forEach(([name, count], i) => { if (i >= 7) return; const coord = coords[i]; const ratio = (sorted[0] && sorted[0][1]) ? count / sorted[0][1] : 0.5; const size = 50 + (ratio * 90); const b = document.createElement('div'); b.className = 'sphere'; b.style.cssText = `width:${size}px; height:${size}px; left:calc(50% + ${coord.x * 120}px - ${size/2}px); top:calc(50% + ${coord.y * 110}px - ${size/2}px); background:rgb(${[0, 80, 130, 180, 210, 230, 245][i]},${[0, 80, 130, 180, 210, 230, 245][i]},${[0, 80, 130, 180, 210, 230, 245][i]}); color:${i<3?'#fff':'#000'}; font-weight:600; font-size:${11+(ratio*4)}px; z-index:${100-i}; --b-dur:${(3.5+Math.random()*3)+'s'}; --b-delay:${(Math.random()*-5)+'s'}; --b-x:${(Math.random()*12-6)+'px'}; --b-y:${(Math.random()*12-6)+'px'};`; b.innerHTML = `<span>${name}</span>`; s2.appendChild(b); });
        } catch(e) {}
    };

    window.renderCalendar = () => {
        const grid = document.getElementById('calGrid'); if(!grid) return; grid.innerHTML = '';
        const year = viewDate.getFullYear(), month = viewDate.getMonth();
        document.getElementById('calTitle').innerText = `${year}年 ${month+1}月`;
        const firstDay = new Date(year, month, 1).getDay(); const daysInMonth = new Date(year, month+1, 0).getDate();
        for(let i=0; i<firstDay; i++) grid.innerHTML += '<div></div>';
        for(let d=1; d<=daysInMonth; d++) {
            const dayLogs = logsCache.filter(l => { const ld = l.timestamp?.toDate() || new Date(); return ld.getMonth() === month && ld.getDate() === d; });
            const dayEl = document.createElement('div'); dayEl.className = 'cal-day'; dayEl.innerHTML = `${d}<div style="display:block">${dayLogs.slice(0,3).map(()=>'<div class="heat-dot"></div>').join('')}</div>`;
            dayEl.onclick = (e) => { e.stopPropagation(); window.jumpTo(`${month+1}月${d}日`); }; grid.appendChild(dayEl);
        }
    };

    window.jumpTo = (id) => { const el = document.getElementById('date-'+id); if(el) { document.getElementById('memoryArea').scrollTop = el.offsetTop - 20; window.tm(); } };
    window.updW = async (id, w, isCust) => { if(!w) return; await updateDoc(doc(db, "daily_logs", id), { weather: w, isCustom: isCust }); window.loadMemories(); showToast(isCust?'已珍藏':'已紀錄'); };
    window.tm = () => { const t = document.getElementById('timeMachine'); t.style.display = t.style.display==='block'?'none':'block'; };

    window.renderAll = () => {
        const s0 = document.getElementById('stage0'), s1 = document.getElementById('stage1'); s0.innerHTML = ''; s1.innerHTML = '';
        tags.forEach((t, i) => {
            if(t.selected) { 
                const b = document.createElement('button'); b.className = 'pill-tag'; b.innerText = t.name; 
                b.onclick = (e) => { e.stopImmediatePropagation(); window.handleTagClick(t.name); }; 
                s0.appendChild(b); 
            }
            const b2 = document.createElement('button'); b2.className = t.selected ? 'square-tag selected' : 'square-tag';
            b2.innerHTML = `<span>${t.name}</span><br><span style="font-size:10px;opacity:0.5">${t.count||0}</span>`;
            let timer; b2.onmousedown = () => timer = setTimeout(() => { if(confirm('刪除標籤？')){ tags.splice(i,1); renderAll(); localStorage.setItem('myPills', JSON.stringify(tags)); } }, 1000); b2.onmouseup = () => clearTimeout(timer); b2.ontouchstart = b2.onmousedown; b2.ontouchend = b2.onmouseup;
            b2.onclick = (e) => { e.stopImmediatePropagation(); t.selected = !t.selected; renderAll(); localStorage.setItem('myPills', JSON.stringify(tags)); }; s1.appendChild(b2);
        });
    };

    window.onload = () => {
        document.getElementById('sendBtn').onclick = (e) => { e.stopImmediatePropagation(); window.saveAction('input'); };
        document.getElementById('addTagBtn').onclick = (e) => { e.stopImmediatePropagation(); const v = document.getElementById('newTagInput').value; if(v){ tags.unshift({name:v, selected:true, count:0}); renderAll(); document.getElementById('newTagInput').value=''; showToast('已紀錄'); } };
        document.getElementById('tmBtn').onclick = (e) => { e.stopPropagation(); window.tm(); };
        document.getElementById('prevM').onclick = (e) => { e.stopPropagation(); window.changeMonth(-1); };
        document.getElementById('nextM').onclick = (e) => { e.stopPropagation(); window.changeMonth(1); };
        const ed = document.getElementById('quoteEditor'); ed.innerHTML = '';
        quotes.forEach((q, i) => { ed.innerHTML += `<div style="padding:15px; border-bottom:0.5px solid #eee; display:flex; align-items:center;"><input id="q-${i}" style="flex:1; border:none; font-size:16px;" value="${q}"><button class="q-save" data-i="${i}" style="background:#1c1c1e;color:#fff;border-radius:10px;padding:8px 14px;font-size:13px;">確定</button></div>`; });
        document.querySelectorAll('.q-save').forEach(b => b.onclick = () => { quotes[b.dataset.i] = document.getElementById('q-'+b.dataset.i).value; localStorage.setItem('myQuotes', JSON.stringify(quotes)); showToast('已鎖定'); });
        renderAll(); triggerSplash(0);
    };

    window.addEventListener('touchstart', e => { window.startY = e.touches[0].clientY; window.tmActive = (document.getElementById('timeMachine').style.display === 'block'); }, {passive: true});
    window.addEventListener('touchend', e => {
        if (window.tmActive) return;
        const dY = window.startY - e.changedTouches[0].clientY;
        const zone = e.target.closest('.memory-area') || e.target.closest('#quoteEditor');
        if (zone) { if ((dY < -130 && zone.scrollTop <= 0) || (dY > 130 && (zone.scrollTop + zone.offsetHeight >= zone.scrollHeight))) { cur = dY > 0 ? Math.min(cur + 1, 4) : Math.max(cur - 1, 0); triggerSplash(cur); } }
        else if (Math.abs(dY) > 80) { cur = dY > 0 ? Math.min(cur + 1, 4) : Math.max(cur - 1, 0); triggerSplash(cur); }
    }, {passive: true});
</script>
</body>
</html>
